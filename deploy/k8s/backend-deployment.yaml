apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hrms-backend
  template:
    metadata:
      labels:
        app: hrms-backend
    spec:
      containers:
        - name: backend
          image: <DOCKERHUB_USERNAME>/hrms-backend:latest
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/hrms_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hrms-secret
                  key: jwt
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: hrms-backend
spec:
  selector:
    app: hrms-backend
  ports:
    - port: 8080
