# CI: build backend and frontend Docker images and push to GitHub Container Registry
# Requires repository secrets: CR_PAT (Personal Access Token with packages:write), or use GITHUB_TOKEN with appropriate permissions
name: CI Build and Publish

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hrms-backend:latest
            ghcr.io/${{ github.repository_owner }}/hrms-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hrms-frontend:latest
            ghcr.io/${{ github.repository_owner }}/hrms-frontend:${{ github.sha }}
