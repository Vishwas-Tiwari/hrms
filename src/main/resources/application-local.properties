spring.datasource.url=jdbc:h2:file:./data/hrmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
frontend.origin=http://localhost:3000

# Disable Flyway in local run to avoid dependency on migrations if Flyway not configured
spring.flyway.enabled=false

jwt.secret=localdevsecretlocaldevsecretlocaldevsecret
jwt.expiration=86400000
